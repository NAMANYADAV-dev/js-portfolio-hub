<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notes App</title>

    <link rel="stylesheet"
          href="Notes.css">
</head>

<body>

<div class="container">

    <h1>Notes App</h1>

    <input
        type="text"
        id="title"
        placeholder="Enter title">

    <textarea
        id="description"
        placeholder="Write your note"></textarea>

    <button id="addBtn">
        Add Note
    </button>

    <div id="notesContainer">

    </div>

</div>

<script src="Notes.js"></script>

</body>
</html>>
