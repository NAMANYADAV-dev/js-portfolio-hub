<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="bmi.css">
</head>
<body>
    <!-- Input Screen -->
    <div id="container">
        <h1 class="main-heading">BMI CALCULATOR</h1>

        <div class="input_box">
            <label for="height">Height :</label>
            <input type="number" placeholder="Inches mein" id="height">
        </div>

        <div class="input_box">
            <label for="weight">Weight :</label>
            <input type="number" placeholder="Pounds mein" id="weight">
        </div>

        <button id="btn" type="submit">Submit</button>
    </div>
    
    <!-- Result Screen -->
    <div id="answer">
        <h1 class="main-heading">BMI CALCULATOR</h1>
        <p id="waiting">Default</p>
        <h1 id="waiting_1">22</h1>
        <button id="btn-1" type="reset">Reset</button> 
    </div>

    <script src="bmi.js"></script>
</body>
</html>
